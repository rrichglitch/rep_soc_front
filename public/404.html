<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="refresh" content="0;url=/rep_soc_front/" />
    <title>Redirecting...</title>
    <script>
      // Store the current URL (including query params) so we can restore it
      if (window.location.pathname.includes('/callback')) {
        sessionStorage.setItem('auth_redirect_path', window.location.pathname + window.location.search);
      }
      window.location.replace('/rep_soc_front/');
    </script>
  </head>
  <body>
    <p>Redirecting...</p>
  </body>
</html>
